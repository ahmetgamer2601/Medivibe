<!DOCTYPE html>
<html lang="tr">
<head>


<link rel="icon" href="favicon.ico">
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Şehir Şifa Bankası | Envanter</title>
    <link rel="stylesheet" href="rehber.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <div class="app-wrapper">
        <nav class="nav-bar">
            <div class="nav-container">
                <div class="brand">
                    <div class="brand-logo"></div> <span class="brand-name">Şifa Bankası</span>
                </div>
                <button onclick="window.history.back()" class="btn-back">Panale Dön</button>
            </div>
        </nav>

        <header class="header">
            <h1>Şehir Envanteri</h1>
            <p>Türkiye'nin 81 ilindeki rehabilitasyon ve kültür rotaları.</p>
        </header>

        <main class="content">
            <section class="section-featured">
                <h2 class="section-title">Öne Çıkan Şifa Şehirleri</h2>
                <div id="featuredGrid" class="grid-featured">
                    </div>
            </section>

            <section class="section-others">
                <h2 class="section-title">Tüm Şehirler</h2>
                <div id="otherCitiesList" class="city-list">
                    </div>
            </section>
        </main>
    </div>

    <div id="detailOverlay" class="overlay hidden">
        <div class="overlay-content">
            <button class="close-overlay">Kapat</button>
            <div id="overlayData"></div>
        </div>
    </div>

    <script src="rehber.js"></script>
</body>
</html>
