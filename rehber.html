<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sağlık Turizmi | Kültürel İyileşme Rehberi</title>
    <link rel="stylesheet" href="rehber.css">
</head>
<body>
    <div class="bg-blur shape-top"></div>
    <div class="bg-blur shape-bottom"></div>

    <div class="main-layout">
        <header class="navbar">
            <button onclick="window.history.back()" class="back-link">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                Geri Dön
            </button>
            <div class="brand">
                <span class="pulse-icon"></span>
                <h1>Şehir Şifa Bankası</h1>
                <span class="sf-badge">Sosyalfest 2026</span>
            </div>
        </header>

        <section class="hero-section">
            <h2 class="animate-text">İyileşme Rotanızı Keşfedin</h2>
            <p>Tedavi sonrası rehabilitasyon sürecini kültürel mirasla birleştiren akıllı rehber sistemi.</p>
            
            <div class="input-group">
                <select id="citySelector" class="modern-select">
                    <option value="" disabled selected>Şehir seçerek analizi başlatın...</option>
                    <option value="eskisehir">Eskişehir</option>
                    <option value="adana">Adana</option>
                    <option value="istanbul">İstanbul</option>
                    <option value="antalya">Antalya</option>
                    <option value="ankara">Ankara</option>
                    </select>
                <div class="select-arrow"></div>
            </div>
        </section>

        <main id="resultContainer" class="results-grid hidden">
            </main>
    </div>

    <script src="rehber.js"></script>
</body>
</html>
